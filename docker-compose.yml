# 3API Relay Panel — single-tenant deployment with bundled Postgres
# (Compose v2+; no `version:` field needed.)

services:
  panel:
    # Default: build from source (`docker compose build`).
    # To pull from a registry instead, override at compose-up time:
    #   IMAGE_SOURCE=ghcr.io/3api-pro/relay-panel:latest docker compose up -d
    image: ${PANEL_IMAGE:-3api-relay-panel:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 3api-panel
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    # Healthcheck is defined in the Dockerfile so it follows ${PORT}.

  postgres:
    image: postgres:16-alpine
    container_name: 3api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: 3api
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-3api_secret_change_me}
      POSTGRES_DB: relay_panel
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 3api -d relay_panel"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: 3api-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy-data:/data
      - ./caddy-config:/config
    depends_on:
      - panel
