<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#06070a" />
    <!-- 首帧前同步定主题，杜绝亮色用户闪暗（FOUC）。与 useTheme.ts 逻辑一致。 -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem('rp-theme');
          var t =
            p === 'light' || p === 'dark'
              ? p
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <!--
      落地页（/welcome）专用字体：Familjen Grotesk / Hanken Grotesk / Instrument Serif / JetBrains Mono。
      生产走真实域名可加载；后台面板不用这些字体，缺失时 LandingView 内已声明 system-ui / serif / monospace 兜底。
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2308090c'/%3E%3Cpath d='M9 22V10h7.5a4.5 4.5 0 0 1 1.8 8.6L23 22h-4.4l-3.9-4.5H13V22Z' fill='%236d8bff'/%3E%3C/svg%3E"
    />
    <title>relay-panel</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
