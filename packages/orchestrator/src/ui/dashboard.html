<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>relay-panel · 站群总览</title>
<style>
  :root {
    --bg: #08090c;
    --panel: #101218;
    --panel-2: #151822;
    --border: #1f2430;
    --border-hi: #2b3142;
    --text: #e7e9ee;
    --muted: #8b91a1;
    --faint: #5a6070;
    --accent: #6d8bff;
    --green: #43d17f;
    --red: #ff5c6c;
    --amber: #f0b74a;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(109,139,255,0.08), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(67,209,127,0.05), transparent 55%),
      var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 40px 28px 80px; }
  header { display: flex; align-items: baseline; justify-content: space-between; gap: 20px; margin-bottom: 8px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 14px var(--accent); }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .meta { color: var(--faint); font-size: 12.5px; display: flex; align-items: center; gap: 14px; }
  .meta button {
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; font-size: 12.5px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    transition: border-color .15s, color .15s;
  }
  .meta button:hover { border-color: var(--border-hi); color: var(--text); }

  .totals { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin: 28px 0 30px; }
  .stat { background: linear-gradient(180deg, var(--panel), var(--panel-2)); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 18px 16px; }
  .stat .k { color: var(--faint); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; display: flex; align-items: center; gap: 7px; }
  .stat .v { font-size: 26px; font-weight: 650; letter-spacing: -0.02em; margin-top: 10px; font-variant-numeric: tabular-nums; }
  .stat .v small { font-size: 14px; color: var(--muted); font-weight: 500; margin-left: 3px; }

  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: border-color .15s, transform .15s; }
  .card:hover { border-color: var(--border-hi); }
  .card .top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .card .site { display: flex; align-items: center; gap: 11px; min-width: 0; }
  .card .site .name { font-weight: 600; font-size: 15.5px; letter-spacing: -0.01em; }
  .card .site .host { color: var(--faint); font-size: 12.5px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border-hi); color: var(--muted); white-space: nowrap; }
  .badge .led { width: 7px; height: 7px; border-radius: 50%; }
  .badge.ok { color: var(--green); border-color: rgba(67,209,127,.3); background: rgba(67,209,127,.07); }
  .badge.ok .led { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .badge.down { color: var(--red); border-color: rgba(255,92,108,.3); background: rgba(255,92,108,.07); }
  .badge.down .led { background: var(--red); }

  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 18px; }
  .metric { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 13px; }
  .metric .mk { color: var(--faint); font-size: 11.5px; display: flex; align-items: center; gap: 6px; }
  .metric .mv { font-size: 19px; font-weight: 600; margin-top: 6px; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .metric .mv small { font-size: 12px; color: var(--muted); font-weight: 500; }

  .err { margin-top: 16px; color: var(--amber); font-size: 12.5px; background: rgba(240,183,74,.07); border: 1px solid rgba(240,183,74,.2); border-radius: 10px; padding: 10px 12px; }
  .foot { margin-top: 40px; color: var(--faint); font-size: 12px; text-align: center; }
  svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex: none; }
  .skeleton { color: var(--faint); text-align: center; padding: 60px 0; }
  @media (max-width: 820px) { .totals { grid-template-columns: repeat(2,1fr); } .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="dot"></span>
      <div>
        <h1>站群总览</h1>
        <div class="sub">relay-panel · 多站中转站编排</div>
      </div>
    </div>
    <div class="meta">
      <span id="ts">—</span>
      <button id="refresh"><svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>刷新</button>
    </div>
  </header>

  <section class="totals" id="totals"></section>
  <section class="grid" id="grid"><div class="skeleton">加载中…</div></section>
  <div class="foot">只读快照 · 15s 缓存 · 数据源为各站 admin API</div>
</div>

<script>
const fmtInt = (n) => (n ?? 0).toLocaleString('en-US');
const fmtTok = (n) => { n = n ?? 0; if (n >= 1e9) return (n/1e9).toFixed(2)+'B'; if (n >= 1e6) return (n/1e6).toFixed(2)+'M'; if (n >= 1e3) return (n/1e3).toFixed(1)+'K'; return String(n); };
const fmtUsd = (n) => '$' + (n ?? 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

const ICON = {
  server: '<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><path d="M6 6h.01M6 18h.01"/></svg>',
  layers: '<svg viewBox="0 0 24 24"><path d="M12 2 2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>',
  plug: '<svg viewBox="0 0 24 24"><path d="M9 2v6M15 2v6M6 8h12v3a6 6 0 0 1-12 0V8zM12 17v5"/></svg>',
  activity: '<svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>',
  coins: '<svg viewBox="0 0 24 24"><ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v6c0 1.66 3.58 3 8 3s8-1.34 8-3V6M4 12v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6"/></svg>',
  users: '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
};

async function load() {
  const res = await fetch('/api/sites');
  const data = await res.json();
  render(data);
}

function render(data) {
  const sites = data.sites || [];
  document.getElementById('ts').textContent = '更新于 ' + new Date(data.generatedAt).toLocaleTimeString('zh-CN');

  const up = sites.filter(s => s.ok).length;
  const acct = sites.reduce((a, s) => a + (s.accounts?.active ?? 0), 0);
  const req = sites.reduce((a, s) => a + (s.usage24h?.requests ?? 0), 0);
  const cost = sites.reduce((a, s) => a + (s.usage24h?.cost ?? 0), 0);

  document.getElementById('totals').innerHTML = [
    ['站点在线', ICON.server, `${up}<small>/ ${sites.length}</small>`],
    ['活跃上游', ICON.plug, fmtInt(acct)],
    ['24h 请求', ICON.activity, fmtInt(req)],
    ['24h 成本', ICON.coins, fmtUsd(cost)],
  ].map(([k, ic, v]) => `<div class="stat"><div class="k">${ic}${k}</div><div class="v">${v}</div></div>`).join('');

  document.getElementById('grid').innerHTML = sites.map(cardHtml).join('');
}

function cardHtml(s) {
  const badge = s.ok
    ? `<span class="badge ok"><span class="led"></span>在线${s.latencyMs != null ? ' · ' + s.latencyMs + 'ms' : ''}</span>`
    : `<span class="badge down"><span class="led"></span>离线</span>`;
  const body = s.ok ? `
    <div class="row">
      <div class="metric"><div class="mk">${ICON.plug}上游</div><div class="mv">${s.accounts.active}<small> / ${s.accounts.total}</small></div></div>
      <div class="metric"><div class="mk">${ICON.activity}24h 请求</div><div class="mv">${fmtInt(s.usage24h.requests)}</div></div>
      <div class="metric"><div class="mk">${ICON.coins}24h 成本</div><div class="mv">${fmtUsd(s.usage24h.cost)}</div></div>
      <div class="metric"><div class="mk">${ICON.layers}分组</div><div class="mv">${s.groups}</div></div>
      <div class="metric"><div class="mk">${ICON.activity}24h Tokens</div><div class="mv">${fmtTok(s.usage24h.tokens)}</div></div>
      <div class="metric"><div class="mk">${ICON.server}品牌</div><div class="mv" style="font-size:14px">${escapeHtml(s.branding || '—')}</div></div>
    </div>` : `<div class="err">${escapeHtml(s.error || '无法连接')}</div>`;
  return `<div class="card">
    <div class="top">
      <div class="site"><div><div class="name">${escapeHtml(s.label)}</div><div class="host">${escapeHtml(s.engine)} · ${escapeHtml(s.slug)}</div></div></div>
      ${badge}
    </div>${body}</div>`;
}

function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }

document.getElementById('refresh').addEventListener('click', load);
load();
setInterval(load, 30000);
</script>
</body>
</html>
