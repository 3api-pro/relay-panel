name: CI

# Only on pull_request — push to main does NOT trigger CI here.
#
# Reason: every push from the dev environment runs the full local pre-flight
# (tsc, next build, smoke suites — see scripts/smoke-*.sh) before pushing.
# Running CI again on GH adds nothing for our pushes and causes failure
# emails when the node_modules layout differs (our local repo symlinks
# node_modules to a sibling project, GH runners install from package.json).
#
# CI still runs on PRs — that's the case where we DON'T trust the
# contributor's local env, so the gate is useful.
#
# Manual run: workflow_dispatch button on the Actions tab.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --if-present
      - run: npx tsc --noEmit

  ui-build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install UI deps
        working-directory: ui
        run: npm ci
      - name: Build UI
        working-directory: ui
        run: npm run build
